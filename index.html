<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111215" />
    <meta name="description" content="Minimal Pokemon file editor." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Bill's secret PC</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card">
        <h1>Bill's secret PC</h1>
        <label class="upload-zone" for="file-input">
          <input id="file-input" type="file" accept=".pb7,.pk8,.pa8,.pk9,.pa9" />
          <span class="upload-title">Tap to load a Pokemon file</span>
          <span class="upload-copy">Supported: LGPE, SWSH, PLA, SV and ZA.</span>
        </label>
        <p id="status-banner" class="status hidden" aria-live="polite"></p>
      </section>

      <section id="summary-card" class="card summary hidden" aria-live="polite">
        <p class="eyebrow">Pokemon detected</p>
        <div class="summary-headline">
          <h2 id="pokemon-name">-</h2>
          <p id="pokemon-level" class="pokemon-level">Level -</p>
        </div>
      </section>

      <form id="editor-form" class="editor hidden" novalidate>
        <section class="card">
          <div class="section-head">
            <div>
              <p class="eyebrow">Stat Points</p>
              <h3>SP spread</h3>
            </div>
            <div class="ev-total-wrap">
              <span id="ev-total" class="ev-total">0 / 66 SP</span>
            </div>
          </div>

          <div class="ev-grid">
            <label>
              <span>HP <strong data-ev-value="hp">0</strong></span>
              <input data-ev-input="hp" type="range" min="0" max="32" step="1" value="0" />
            </label>
            <label>
              <span>Atk <strong data-ev-value="atk">0</strong></span>
              <input data-ev-input="atk" type="range" min="0" max="32" step="1" value="0" />
            </label>
            <label>
              <span>Def <strong data-ev-value="def">0</strong></span>
              <input data-ev-input="def" type="range" min="0" max="32" step="1" value="0" />
            </label>
            <label>
              <span>SpA <strong data-ev-value="spa">0</strong></span>
              <input data-ev-input="spa" type="range" min="0" max="32" step="1" value="0" />
            </label>
            <label>
              <span>SpD <strong data-ev-value="spd">0</strong></span>
              <input data-ev-input="spd" type="range" min="0" max="32" step="1" value="0" />
            </label>
            <label>
              <span>Spe <strong data-ev-value="spe">0</strong></span>
              <input data-ev-input="spe" type="range" min="0" max="32" step="1" value="0" />
            </label>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <p class="eyebrow">Build</p>
              <h3>Stat nature and ability</h3>
            </div>
          </div>

          <div class="field-stack">
            <label>
              <span>Stat Nature</span>
              <select id="nature-select"></select>
            </label>
            <label>
              <span>Ability</span>
              <select id="ability-input"></select>
            </label>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <p class="eyebrow">Moveset</p>
              <h3>Moves</h3>
            </div>
          </div>

          <div class="field-stack">
            <label>
              <span>Move 1</span>
              <select data-move-input="1"></select>
            </label>
            <label>
              <span>Move 2</span>
              <select data-move-input="2"></select>
            </label>
            <label>
              <span>Move 3</span>
              <select data-move-input="3"></select>
            </label>
            <label>
              <span>Move 4</span>
              <select data-move-input="4"></select>
            </label>
          </div>
        </section>

        <div class="action-bar">
          <button id="save-button" type="submit">Save &amp; Export</button>
        </div>
      </form>
      <button id="check-update-button" class="update-link" type="button">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M20 6v5h-5"/>
          <path d="M4 18v-5h5"/>
          <path d="M18.2 9A7 7 0 0 0 6.3 6.8L4 9"/>
          <path d="M5.8 15a7 7 0 0 0 11.9 2.2L20 15"/>
        </svg>
        <span>Check for updates</span>
      </button>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
